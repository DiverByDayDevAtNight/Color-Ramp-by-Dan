<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Color Ramp Generator</title>
<style>
  * { box-sizing: border-box; }
  body {
    background: #15161d;
    color: #d6d6e0;
    font-family: -apple-system, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    padding: 32px 20px 60px;
  }
  h1 { font-size: 16px; font-weight: 600; color: #f0f0f5; margin: 0; }
  .panel {
    background: #1c1e29;
    border: 1px solid #2a2c3a;
    border-radius: 10px;
    padding: 16px 20px;
    width: 100%;
    max-width: 760px;
  }
  .label-tag { margin: 0 0 10px; font-size: 11px; letter-spacing: 0.06em; color: #888; text-transform: uppercase; }

  /* controls bar */
  .controls { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; }
  .control-group { display: flex; flex-direction: column; gap: 4px; }
  .control-group label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
  select, input[type="number"], input[type="text"] {
    background: #15161d;
    color: #d6d6e0;
    border: 1px solid #34374a;
    border-radius: 5px;
    padding: 6px 8px;
    font-size: 12px;
    font-family: inherit;
  }
  input[type="number"] { width: 56px; }
  input[type="color"] {
    width: 40px; height: 32px; border: none; border-radius: 6px; cursor: pointer; background: none; padding: 0;
  }
  .oklch-readout { font-family: monospace; font-size: 10px; color: #6b6f8a; align-self: center; }
  button {
    padding: 7px 14px;
    cursor: pointer;
    background: #2b2d3d;
    color: #d6d6e0;
    border: 1px solid #3c3f54;
    border-radius: 6px;
    font-size: 12px;
  }
  button:hover { background: #34374a; }
  button.primary { background: #4a3f7a; border-color: #5d4fa3; color: #fff; }
  button.primary:hover { background: #5d4fa3; }

  /* swatch rows */
  .swatch-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .swatch-card { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 80px; }
  .swatch-color {
    width: 80px; height: 54px; border-radius: 6px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.15); position: relative;
  }
  .lock-btn {
    position: absolute; top: 4px; right: 4px;
    width: 20px; height: 20px; border-radius: 4px;
    background: rgba(0,0,0,0.55); border: none; color: #fff;
    font-size: 11px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; padding: 0;
  }
  .lock-btn.locked { background: #c9a447; color: #1c1300; }
  .swatch-hex { font-size: 10px; font-family: monospace; color: #9a9ab0; }
  .contrast-row { display: flex; gap: 3px; }
  .pill { font-size: 8px; padding: 2px 5px; border-radius: 3px; font-family: monospace; cursor: default; }
  .pill-pass { background: #3a8f5f; color: #eafff0; }
  .pill-aa { background: #c9a447; color: #221a00; }
  .pill-fail { background: #4a4a55; color: #b0b0c0; }

  /* export */
  .tabs { display: flex; gap: 6px; margin-bottom: 10px; }
  .tab-btn { background: #15161d; border: 1px solid #34374a; }
  .tab-btn.active { background: #4a3f7a; border-color: #5d4fa3; color: #fff; }
  pre#exportPreview {
    background: #15161d; border: 1px solid #2a2c3a; border-radius: 6px;
    padding: 14px; font-family: monospace; font-size: 11.5px; line-height: 1.5;
    white-space: pre; overflow-x: auto; margin: 0 0 10px; max-height: 260px;
  }
  .export-bottom { display: flex; gap: 10px; align-items: center; }

  .random-result { display: flex; gap: 14px; flex-wrap: wrap; justify-content: flex-start; }
  .random-swatch { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .random-color { width: 64px; height: 64px; border-radius: 6px; border: 1px solid #333; }
  .random-cat { font-size: 10px; color: #888; }
  .random-hex { font-size: 11px; font-family: monospace; }
</style>
</head>
<body>

<h1>Advanced Color Ramp Generator</h1>

<div class="panel">
  <p class="label-tag">Base &amp; Settings</p>
  <div class="controls">
    <div class="control-group">
      <label>Base Color</label>
      <input type="color" id="colorPicker" value="#ff6ec7">
    </div>
    <div class="control-group">
      <label>&nbsp;</label>
      <span class="oklch-readout" id="oklchReadout">L 0.00 C 0.00 H 0°</span>
    </div>
    <div class="control-group">
      <label>Curve</label>
      <select id="curveSelect">
        <option value="linear">Linear</option>
        <option value="easeIn">Ease In</option>
        <option value="easeOut" selected>Ease Out</option>
        <option value="easeInOut">Ease In Out</option>
      </select>
    </div>
    <div class="control-group">
      <label>Steps</label>
      <input type="number" id="stepsInput" value="8" min="3" max="12">
    </div>
    <div class="control-group">
      <label>Accent Harmony</label>
      <select id="harmonySelect">
        <option value="monochromatic">Monochromatic</option>
        <option value="complementary">Complementary</option>
        <option value="analogous" selected>Analogous</option>
        <option value="triadic">Triadic</option>
        <option value="splitComplementary">Split-Complementary</option>
        <option value="tetradic">Tetradic</option>
      </select>
    </div>
    <div class="control-group">
      <label>&nbsp;</label>
      <button id="unlockAllBtn">Unlock All</button>
    </div>
  </div>
</div>

<div class="panel">
  <p class="label-tag">Lights</p>
  <div class="swatch-row" id="lightsRow"></div>
</div>

<div class="panel">
  <p class="label-tag">Darks</p>
  <div class="swatch-row" id="darksRow"></div>
</div>

<div class="panel">
  <p class="label-tag">Accents</p>
  <div class="swatch-row" id="accentsRow"></div>
</div>

<div class="panel">
  <p class="label-tag">Random Palette (locked swatches are always included)</p>
  <button id="generatePaletteBtn" style="margin-bottom: 12px;">Generate Random Palette</button>
  <div class="random-result" id="paletteResult"></div>
</div>

<div class="panel">
  <p class="label-tag">Export</p>
  <div class="controls" style="margin-bottom: 12px;">
    <div class="control-group">
      <label>Name Prefix</label>
      <input type="text" id="prefixInput" placeholder="myPalette" value="palette">
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="css">CSS Vars</button>
    <button class="tab-btn" data-tab="tailwind">Tailwind</button>
    <button class="tab-btn" data-tab="json">JSON</button>
    <button class="tab-btn" data-tab="scss">SCSS</button>
  </div>
  <pre id="exportPreview"></pre>
  <div class="export-bottom">
    <button id="copyExportBtn" class="primary">Copy</button>
    <span id="copyStatus" style="font-size: 11px; color: #6b6f8a;"></span>
  </div>
</div>

<script>
/* ---------- color space conversions (sRGB <-> OKLCH) ---------- */

function hexToRgb(hex) {
  hex = hex.replace('#', '');
  return [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];
}
function rgbToHex(r,g,b) {
  const toHex = v => Math.round(Math.min(255, Math.max(0, v))).toString(16).padStart(2,'0');
  return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
}
function srgbToLinearChannel(c) {
  c /= 255;
  return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
}
function linearToSrgbChannel(c) {
  const v = c <= 0.0031308 ? c * 12.92 : 1.055 * Math.pow(Math.max(c,0), 1/2.4) - 0.055;
  return v * 255;
}

function hexToOklch(hex) {
  const [r8,g8,b8] = hexToRgb(hex);
  const r = srgbToLinearChannel(r8), g = srgbToLinearChannel(g8), b = srgbToLinearChannel(b8);
  const l = 0.4122214708*r + 0.5363325363*g + 0.0514459929*b;
  const m = 0.2119034982*r + 0.6806995451*g + 0.1073969566*b;
  const s = 0.0883024619*r + 0.2817188376*g + 0.6299787005*b;
  const l_ = Math.cbrt(l), m_ = Math.cbrt(m), s_ = Math.cbrt(s);
  const L = 0.2104542553*l_ + 0.7936177850*m_ - 0.0040720468*s_;
  const a = 1.9779984951*l_ - 2.4285922050*m_ + 0.4505937099*s_;
  const bb = 0.0259040371*l_ + 0.7827717662*m_ - 0.8086757660*s_;
  const C = Math.sqrt(a*a + bb*bb);
  let H = Math.atan2(bb, a) * 180 / Math.PI;
  if (H < 0) H += 360;
  return { L, C, H };
}

function oklchToLinearRgb(L, C, H) {
  const hr = H * Math.PI / 180;
  const a = C * Math.cos(hr);
  const b = C * Math.sin(hr);
  const l_ = L + 0.3963377774*a + 0.2158037573*b;
  const m_ = L - 0.1055613458*a - 0.0638541728*b;
  const s_ = L - 0.0894841775*a - 1.2914855480*b;
  const l = l_*l_*l_, m = m_*m_*m_, s = s_*s_*s_;
  const r = +4.0767416621*l - 3.3077115913*m + 0.2309699292*s;
  const g = -1.2684380046*l + 2.6097574011*m - 0.3413193965*s;
  const bch = -0.0041960863*l - 0.7034186147*m + 1.7076147010*s;
  return [r, g, bch];
}

function oklchToHexClamped(L, C, H) {
  let c = Math.max(C, 0);
  let r, g, b;
  for (let i = 0; i < 24; i++) {
    [r, g, b] = oklchToLinearRgb(L, c, H);
    if (r >= -0.0005 && r <= 1.0005 && g >= -0.0005 && g <= 1.0005 && b >= -0.0005 && b <= 1.0005) break;
    c *= 0.92;
  }
  const r8 = linearToSrgbChannel(Math.min(Math.max(r,0),1));
  const g8 = linearToSrgbChannel(Math.min(Math.max(g,0),1));
  const b8 = linearToSrgbChannel(Math.min(Math.max(b,0),1));
  return rgbToHex(r8, g8, b8);
}

/* ---------- contrast ---------- */

function relLuminance(hex) {
  const [r8,g8,b8] = hexToRgb(hex);
  const lin = v => { v /= 255; return v <= 0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4); };
  return 0.2126*lin(r8) + 0.7152*lin(g8) + 0.0722*lin(b8);
}
function contrastRatio(hexA, hexB) {
  const L1 = relLuminance(hexA), L2 = relLuminance(hexB);
  const lighter = Math.max(L1,L2), darker = Math.min(L1,L2);
  return (lighter + 0.05) / (darker + 0.05);
}
function contrastGrade(ratio) {
  if (ratio >= 7) return { label: 'AAA', cls: 'pill-pass' };
  if (ratio >= 4.5) return { label: 'AA', cls: 'pill-pass' };
  if (ratio >= 3) return { label: 'AA-L', cls: 'pill-aa' };
  return { label: 'Fail', cls: 'pill-fail' };
}

/* ---------- curves ---------- */

const curves = {
  linear: t => t,
  easeIn: t => t * t,
  easeOut: t => 1 - (1 - t) * (1 - t),
  easeInOut: t => t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2) / 2
};

/* ---------- ramp generation ---------- */

function computeLights(L, C, H, steps, curveType) {
  const curveFn = curves[curveType];
  const maxL = 0.97;
  const arr = [];
  for (let i = 0; i < steps; i++) {
    const t = steps === 1 ? 0 : i / (steps - 1);
    const tc = curveFn(t);
    const Li = L + (maxL - L) * tc;
    const Ci = C * (1 - 0.45 * tc);
    arr.push({ L: Li, C: Ci, H, hex: oklchToHexClamped(Li, Ci, H) });
  }
  return arr;
}

function computeDarks(L, C, H, steps, curveType) {
  const curveFn = curves[curveType];
  const minL = 0.12;
  const arr = [];
  for (let i = 0; i < steps; i++) {
    const t = steps === 1 ? 0 : i / (steps - 1);
    const tc = curveFn(t);
    const Li = L - (L - minL) * tc;
    const Ci = C * (1 - 0.45 * tc);
    arr.push({ L: Li, C: Ci, H, hex: oklchToHexClamped(Li, Ci, H) });
  }
  return arr;
}

function computeAccents(L, C, H, mode) {
  if (mode === 'monochromatic') {
    const variations = [
      { L: Math.max(L - 0.18, 0.1), C: C * 0.85 },
      { L: Math.max(L - 0.09, 0.1), C: C * 0.95 },
      { L, C },
      { L: Math.min(L + 0.09, 0.95), C: C * 0.95 },
      { L: Math.min(L + 0.18, 0.95), C: C * 0.85 }
    ];
    return variations.map(v => ({ L: v.L, C: v.C, H, hex: oklchToHexClamped(v.L, v.C, H) }));
  }
  let hues;
  switch (mode) {
    case 'complementary': hues = [H, (H + 180) % 360]; break;
    case 'analogous': hues = [(H - 30 + 360) % 360, H, (H + 30) % 360]; break;
    case 'triadic': hues = [H, (H + 120) % 360, (H + 240) % 360]; break;
    case 'splitComplementary': hues = [H, (H + 150) % 360, (H + 210) % 360]; break;
    case 'tetradic': hues = [H, (H + 90) % 360, (H + 180) % 360, (H + 270) % 360]; break;
    default: hues = [H];
  }
  return hues.map(h => ({ L, C, H: h, hex: oklchToHexClamped(L, C, h) }));
}

/* ---------- state ---------- */

let baseColor = { hex: '#ff6ec7', ...hexToOklch('#ff6ec7') };
let steps = 8;
let curveType = 'easeOut';
let harmonyMode = 'analogous';
let lights = [];
let darks = [];
let accents = [];
let exportTab = 'css';

function mergeWithLocks(oldArr, newArr) {
  return newArr.map((item, i) => {
    if (oldArr[i] && oldArr[i].locked) return oldArr[i];
    return { ...item, locked: false };
  });
}

function recomputeAll() {
  const newLights = computeLights(baseColor.L, baseColor.C, baseColor.H, steps, curveType);
  const newDarks = computeDarks(baseColor.L, baseColor.C, baseColor.H, steps, curveType);
  const newAccents = computeAccents(baseColor.L, baseColor.C, baseColor.H, harmonyMode);
  lights = mergeWithLocks(lights, newLights);
  darks = mergeWithLocks(darks, newDarks);
  accents = mergeWithLocks(accents, newAccents);
  renderAll();
}

function setPrimary(hex) {
  baseColor = { hex, ...hexToOklch(hex) };
  document.getElementById('colorPicker').value = hex;
  recomputeAll();
}

/* ---------- rendering ---------- */

function renderRow(containerId, arr) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  arr.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'swatch-card';

    const colorBox = document.createElement('div');
    colorBox.className = 'swatch-color';
    colorBox.style.background = c.hex;
    colorBox.title = 'Click to use as base color';
    colorBox.addEventListener('click', () => setPrimary(c.hex));

    const lockBtn = document.createElement('button');
    lockBtn.className = 'lock-btn' + (c.locked ? ' locked' : '');
    lockBtn.textContent = c.locked ? '\uD83D\uDD12' : '\uD83D\uDD13';
    lockBtn.title = c.locked ? 'Locked — click to unlock' : 'Unlocked — click to lock';
    lockBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      arr[i].locked = !arr[i].locked;
      renderAll();
    });
    colorBox.appendChild(lockBtn);

    const hexLabel = document.createElement('span');
    hexLabel.className = 'swatch-hex';
    hexLabel.textContent = c.hex;

    const contrastRow = document.createElement('div');
    contrastRow.className = 'contrast-row';
    const wRatio = contrastRatio(c.hex, '#ffffff');
    const bRatio = contrastRatio(c.hex, '#000000');
    const wGrade = contrastGrade(wRatio);
    const bGrade = contrastGrade(bRatio);

    const wPill = document.createElement('span');
    wPill.className = 'pill ' + wGrade.cls;
    wPill.textContent = 'W ' + wRatio.toFixed(1);
    wPill.title = `vs white: ${wRatio.toFixed(2)}:1 (${wGrade.label})`;

    const bPill = document.createElement('span');
    bPill.className = 'pill ' + bGrade.cls;
    bPill.textContent = 'B ' + bRatio.toFixed(1);
    bPill.title = `vs black: ${bRatio.toFixed(2)}:1 (${bGrade.label})`;

    contrastRow.appendChild(wPill);
    contrastRow.appendChild(bPill);

    card.appendChild(colorBox);
    card.appendChild(hexLabel);
    card.appendChild(contrastRow);
    container.appendChild(card);
  });
}

function renderOklchReadout() {
  document.getElementById('oklchReadout').textContent =
    `L ${baseColor.L.toFixed(2)} C ${baseColor.C.toFixed(2)} H ${Math.round(baseColor.H)}\u00B0`;
}

function renderAll() {
  renderRow('lightsRow', lights);
  renderRow('darksRow', darks);
  renderRow('accentsRow', accents);
  renderOklchReadout();
  updateExportPreview();
}

/* ---------- random palette ---------- */

function pickRandomUnique(arr, count) {
  return [...arr].sort(() => Math.random() - 0.5).slice(0, count);
}

function generateRandomPalette() {
  const tagged = [
    ...lights.map(c => ({ ...c, category: 'Light' })),
    ...darks.map(c => ({ ...c, category: 'Dark' })),
    ...accents.map(c => ({ ...c, category: 'Accent' }))
  ];
  const locked = tagged.filter(c => c.locked);
  const unlocked = tagged.filter(c => !c.locked);
  const targetTotal = 6;
  const remaining = Math.max(0, targetTotal - locked.length);
  const picked = pickRandomUnique(unlocked, Math.min(remaining, unlocked.length));
  const result = [...locked, ...picked].sort(() => Math.random() - 0.5);

  const container = document.getElementById('paletteResult');
  container.innerHTML = '';
  result.forEach(c => {
    const wrap = document.createElement('div');
    wrap.className = 'random-swatch';
    wrap.innerHTML = `
      <div class="random-color" style="background:${c.hex};"></div>
      <span class="random-cat">${c.category}${c.locked ? ' \uD83D\uDD12' : ''}</span>
      <span class="random-hex">${c.hex}</span>
    `;
    container.appendChild(wrap);
  });
}

/* ---------- export ---------- */

function buildEntries() {
  const entries = [{ key: 'base', hex: baseColor.hex }];
  lights.forEach((c, i) => entries.push({ key: `light-${i+1}`, hex: c.hex }));
  darks.forEach((c, i) => entries.push({ key: `dark-${i+1}`, hex: c.hex }));
  accents.forEach((c, i) => entries.push({ key: `accent-${i+1}`, hex: c.hex }));
  return entries;
}

function toCss(prefix, entries) {
  return `:root {\n${entries.map(e => `  --${prefix}-${e.key}: ${e.hex};`).join('\n')}\n}`;
}
function toScss(prefix, entries) {
  return entries.map(e => `$${prefix}-${e.key}: ${e.hex};`).join('\n');
}
function toJson(prefix, entries) {
  const obj = {};
  entries.forEach(e => { obj[`${prefix}-${e.key}`] = e.hex; });
  return JSON.stringify(obj, null, 2);
}
function toTailwind(prefix, entries) {
  const lines = entries.map(e => `        '${e.key}': '${e.hex}',`).join('\n');
  return `module.exports = {\n  theme: {\n    extend: {\n      colors: {\n        ${prefix}: {\n${lines}\n        }\n      }\n    }\n  }\n};`;
}

function updateExportPreview() {
  const prefix = document.getElementById('prefixInput').value.trim() || 'palette';
  const entries = buildEntries();
  let text = '';
  if (exportTab === 'css') text = toCss(prefix, entries);
  else if (exportTab === 'scss') text = toScss(prefix, entries);
  else if (exportTab === 'json') text = toJson(prefix, entries);
  else if (exportTab === 'tailwind') text = toTailwind(prefix, entries);
  document.getElementById('exportPreview').textContent = text;
}

/* ---------- wiring ---------- */

document.getElementById('colorPicker').addEventListener('input', e => setPrimary(e.target.value));

document.getElementById('curveSelect').addEventListener('change', e => {
  curveType = e.target.value;
  recomputeAll();
});

document.getElementById('stepsInput').addEventListener('change', e => {
  let v = parseInt(e.target.value, 10) || 8;
  v = Math.min(12, Math.max(3, v));
  e.target.value = v;
  steps = v;
  recomputeAll();
});

document.getElementById('harmonySelect').addEventListener('change', e => {
  harmonyMode = e.target.value;
  recomputeAll();
});

document.getElementById('unlockAllBtn').addEventListener('click', () => {
  [...lights, ...darks, ...accents].forEach(c => c.locked = false);
  renderAll();
});

document.getElementById('generatePaletteBtn').addEventListener('click', generateRandomPalette);

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    exportTab = btn.dataset.tab;
    updateExportPreview();
  });
});

document.getElementById('prefixInput').addEventListener('input', updateExportPreview);

document.getElementById('copyExportBtn').addEventListener('click', () => {
  const text = document.getElementById('exportPreview').textContent;
  navigator.clipboard.writeText(text);
  const status = document.getElementById('copyStatus');
  status.textContent = 'Copied!';
  setTimeout(() => { status.textContent = ''; }, 1200);
});

/* ---------- init ---------- */

recomputeAll();
</script>

</body>
</html>
